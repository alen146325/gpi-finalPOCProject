name: CI

on:
  push:
    branches: [develop]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ag-prueba-front/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ag-prueba-front
      - name: Lint
        run: npm run lint --if-present
        working-directory: ag-prueba-front
      - name: Build
        run: npm run build --if-present
        working-directory: ag-prueba-front

  authorization-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build & Package (skip tests)
        run: mvn -B clean package -DskipTests
        working-directory: authorization-server

  resource-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build & Package (skip tests)
        run: mvn -B clean package -DskipTests
        working-directory: resource-server
