name: CD

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  shared-setup:
    uses: ./.github/workflows/shared.yml
    with:
      node_version: '20'
      java_version: '17'
      deploy_env: 'production'

  frontend-deploy:
    needs: shared-setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Angular app
        run: |
          cd ag-prueba-front
          npm ci
          npm run build --if-present
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ag-prueba-front/dist/ag-prueba-front

  authorization-server-deploy:
    needs: shared-setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package JAR (skip tests)
        run: mvn -B clean package -DskipTests
        working-directory: authorization-server
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: authorization-server-jar
          path: authorization-server/target/*.jar

  resource-server-deploy:
    needs: shared-setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package JAR (skip tests)
        run: mvn -B clean package -DskipTests
        working-directory: resource-server
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resource-server-jar
          path: resource-server/target/*.jar
