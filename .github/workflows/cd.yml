name: CD

on:
  push:
    branches: [develop]   # despliegue automático al hacer push en develop
  workflow_dispatch:      # también puedes lanzarlo manualmente

jobs:
  frontend-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Angular app
        run: |
          cd ag-prueba-front
          npm ci
          npm run build --if-present
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ag-prueba-front/dist/ag-prueba-front

  authorization-server-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Package JAR (skip tests)
        run: mvn -B clean package -DskipTests
        working-directory: authorization-server
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: authorization-server-jar
          path: authorization-server/target/*.jar

  resource-server-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Package JAR (skip tests)
        run: mvn -B clean package -DskipTests
        working-directory: resource-server
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resource-server-jar
          path: resource-server/target/*.jar
